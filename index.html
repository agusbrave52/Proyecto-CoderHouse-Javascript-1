<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Cajero Automatico</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <!-- <p style="font-family: Arial, Helvetica, sans-serif; font-size: larger;">Simulador de cajero automatico con transferencias, ingresos y retiros de dinero. Para iniciar el cajero recarga la pagina</p>
    <button type="button" onclick="window.location.reload()" style="font-family: Arial, Helvetica, sans-serif; font-size: medium; padding: 8px 12px; margin-bottom: 16px; cursor: pointer;">Reiniciar cajero</button>
    <p style="font-family: Arial, Helvetica, sans-serif; font-size: larger;">
    datos de los usuarios: <br>
    dni = "12345678", "Juan", "Perez", contraseña = "1234"<br>
    dni = "87654321", "Maria", "Gomez", contraseña = "1234"<br>
    dni = "11223344", "Carlos", "Lopez", contraseña = "1234"<br>
    dni = "44332211", "Ana", "Martinez", contraseña = "1234"<br>
    dni = "55667788", "Luis", "Garcia", contraseña = "1234" -->
    <div class="pcv">
        <div class="datos">
            <p>Datos de los usuarios:</p>
            <ul>
                <li>DNI: 12345678 pass: 1234</li>
                <li>DNI: 87654321 pass: 1234</li>
                <li>DNI: 11223344 pass: 1234</li>
                <li>DNI: 44332211 pass: 1234</li>
                <li>DNI: 55667788 pass: 1234</li>
            </ul>
        </div>
        <div class="borde-pantalla">
            <div class="pantalla">
                <div class="contenido-pantalla">
                    <h1>Simulador de Cajero Automático</h1>
                    <button class="btn-entrar">Entrar al Cajero</button>

                    <div class="datos-ingreso">
                        <label for="dni">DNI:</label>
                        <input type="text" id="dni" name="dni">

                        <label for="password">Contraseña:</label>
                        <input type="password" id="password" name="password">

                        <button class="btn-login">Iniciar Sesión</button>
                    </div>

                    <div class="menu-cajero">
                        <div class="row1">
                            <button class="btn-consultar">Consultar Saldo</button>
                            <button class="btn-retirar">Retirar Dinero</button>
                        </div>
                        <div class="row2">
                            <button class="btn-ingresar">Ingresar Dinero</button>
                            <button class="btn-transferir">Transferir Dinero</button>
                        </div>
                    </div>

                    <div class="menu-retirar">
                        <label for="monto-retirar">Monto a retirar:</label>
                        <input type="number" id="monto-retirar" name="monto-retirar">
                        <button class="btn-confirmar-retiro">Confirmar Retiro</button>
                    </div>

                    <div class="menu-ingresar">
                        <label for="monto-ingresar">Monto a ingresar:</label>
                        <input type="number" id="monto-ingresar" name="monto-ingresar">
                        <button class="btn-confirmar-ingreso">Confirmar Ingreso</button>
                    </div>

                    <div class="menu-transferir">
                        <div class="row1">
                            <label for="dni-destino">DNI del destinatario:</label>
                            <input type="text" id="dni-destino" name="dni-destino">
                        </div>
                        <div class="row2">
                            <label for="monto-transferir">Monto a transferir:</label>
                            <input type="number" id="monto-transferir" name="monto-transferir">
                        </div>
                        <button class="btn-confirmar-transferencia">Confirmar Transferencia</button>
                    </div>
                    <p class="txtInfo"></p>
                    <button class="btn-volver">Volver</button>
                </div>
            </div>
        </div>
        </p>

        <script src="./js/script.js"></script>
</body>

</html>
